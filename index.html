<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Приглашение 💖 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Падающие сердечки */
        .heart {
            position: fixed;
            top: -20px;
            font-size: 1.5rem;
            opacity: 0.7;
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Карточка (общая для всех страниц) */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 60px 60px 80px 80px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            width: 100%;
            padding: 40px 30px 50px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.6rem;
            color: #c53a5f;
            margin-bottom: 15px;
            word-break: keep-all;
            display: inline-block;
            border-bottom: 4px dotted #ffb7c5;
            padding-bottom: 8px;
        }

        .question {
            font-size: 2rem;
            margin: 25px 0 20px;
            color: #a1304f;
            font-weight: 600;
        }

        .gif-container {
            margin: 20px 0;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .gif-container img {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            display: block;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin: 35px 0 25px;
            flex-wrap: wrap;
        }

        button {
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 32px;
            border: none;
            border-radius: 120px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.1);
        }

        .btn-yes {
            background-color: #ff8da1;
            color: white;
            box-shadow: 0 8px 0 #aa2e4e;
        }

        .btn-yes:hover {
            background-color: #ff6b85;
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #aa2e4e;
        }

        .btn-no {
            background-color: #bdc3c7;
            color: #2c3e50;
            box-shadow: 0 8px 0 #7f8c8d;
            position: relative;
        }

        .btn-no:hover {
            background-color: #a4a9ad;
            transform: translateY(-2px);
        }

        .heart-icon {
            font-size: 2rem;
            margin-top: 15px;
            color: #ff5e8b;
            cursor: pointer;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #c97c8f;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px 40px;
            }
            h1 {
                font-size: 2rem;
            }
            .question {
                font-size: 1.6rem;
            }
            button {
                font-size: 1.3rem;
                padding: 8px 22px;
            }
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .page {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>

<!-- СТРАНИЦА 1: Приглашение на свидание -->
<div id="page1" class="card page">
    <h1>💌 Для тебя 💌</h1>
    <div class="gif-container">
        <img src="https://media1.tenor.com/m/Ol_v59QAUgEAAAAC/dance-cat.gif" alt="cute cat">
    </div>
    <div class="question">
        🌸 Пойдешь со мной на свидание? 🌸
    </div>
    <div class="buttons">
        <button class="btn-yes" id="page1YesBtn">Да 💖</button>
        <button class="btn-no" id="page1NoBtn">Нет 🥺</button>
    </div>
    <div class="heart-icon">❤️ 🧡 💛 💚 💙 💜</div>
    <footer>нажми на сердечко ✨</footer>
</div>

<!-- СТРАНИЦА 2: Вопрос про оплату -->
<div id="page2" class="card page" style="display: none;">
    <h1>💸 Важный вопрос 💸</h1>
    <div class="gif-container">
        <img src="https://media1.tenor.com/m/j9QCXq85Ba8AAAAC/peach-peach-and-goma.gif">
    </div>
    <div class="question">
        💰 Платишь ты? 💰
    </div>
    <div class="buttons">
        <button class="btn-yes" id="page2YesBtn">Да 💸</button>
        <button class="btn-no" id="page2NoBtn">Нет 😅</button>
    </div>
    <div class="heart-icon">❤️ 🧡 💛 💚 💙 💜</div>
    <!-- <footer>честно-честно? 😊</footer> -->
</div>

<!-- СТРАНИЦА 3: Финальная (успех) -->
<div id="page3" class="card page" style="display: none;">
    <!-- <h1>🎉 УРА! 🎉</h1> -->
    <div class="gif-container">
        <!-- <img src="https://yandex.ru/images/search?cbird=178&rpt=imageview&url=https%3A%2F%2Fmedia1.tenor.com%2Fm%2FOl_v59QAUgEAAAAC%2Fdance-cat.gif"> -->
         <img src="https://media1.tenor.com/m/hekkbnV_PFMAAAAC/peachandgoma-peach.gif">
    </div>
    <div class="question">
        ЮХУУУУУУУУУУ!!!! ❤️❤️❤️❤️❤️<br>
        <!-- 💖 Свидание состоится! 💖<br> -->
        <span style="font-size: 1.4rem;">💖 Свидание состоится! 💖</span>
    </div>
    <div class="buttons">
        <button class="btn-yes" id="restartBtn" style="background-color: #ff8da1;">🌹 Начать сначала 🌹</button>
    </div>
    <div class="heart-icon">❤️ 🧡 💛 💚 💙 💜</div>
    <!-- <footer>ЮХУУУУУУУУУУ!!!! ❤️❤️❤️❤️❤️ </footer> -->
</div>

<script>
    // === УПРАВЛЕНИЕ СТРАНИЦАМИ ===
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const page3 = document.getElementById('page3');
    
    let currentPage = 1;
    
    function showPage(pageNumber) {
        page1.style.display = 'none';
        page2.style.display = 'none';
        page3.style.display = 'none';
        
        if (pageNumber === 1) page1.style.display = 'block';
        if (pageNumber === 2) page2.style.display = 'block';
        if (pageNumber === 3) page3.style.display = 'block';
        
        currentPage = pageNumber;
        
        // Сбрасываем троллинг для кнопки "Нет" на странице 2 при её открытии
        if (pageNumber === 2) {
            resetNoButtonOnPage2();
        }
    }
    
    // === ОБЩИЕ ФУНКЦИИ ===
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌺'][Math.floor(Math.random() * 8)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = Math.random() * 20 + 14 + 'px';
        heart.style.animationDuration = Math.random() * 3 + 2 + 's';
        heart.style.opacity = Math.random() * 0.6 + 0.3;
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
    
    function createHeartFirework() {
        for (let i = 0; i < 15; i++) {
            setTimeout(() => {
                const fireHeart = document.createElement('div');
                fireHeart.classList.add('heart');
                fireHeart.innerHTML = '💖';
                fireHeart.style.left = Math.random() * 100 + '%';
                fireHeart.style.top = Math.random() * 80 + '%';
                fireHeart.style.fontSize = Math.random() * 30 + 20 + 'px';
                fireHeart.style.animationDuration = '1.2s';
                fireHeart.style.opacity = '1';
                document.body.appendChild(fireHeart);
                setTimeout(() => fireHeart.remove(), 1200);
            }, i * 70);
        }
    }
    
    setInterval(createHeart, 500);
    
    // === ЛОГИКА ДЛЯ КНОПКИ "НЕТ" (убегание) ===
    let noClickCountPage1 = 0;
    let noClickCountPage2 = 0;
    let noButtonPage2 = null;
    
    function moveNoButton(noBtn, pageNum) {
        const maxX = window.innerWidth - noBtn.offsetWidth - 40;
        const maxY = window.innerHeight - noBtn.offsetHeight - 80;
        const randomX = Math.max(20, Math.min(maxX, Math.random() * maxX));
        const randomY = Math.max(20, Math.min(maxY, Math.random() * maxY));
        noBtn.style.position = 'fixed';
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;
        noBtn.style.zIndex = '999';
        
        setTimeout(() => {
            if (noBtn.disabled !== true && noBtn.style.display !== 'none') {
                noBtn.style.position = 'relative';
                noBtn.style.left = 'auto';
                noBtn.style.top = 'auto';
                const buttonsContainer = (pageNum === 1) 
                    ? document.querySelector('#page1 .buttons') 
                    : document.querySelector('#page2 .buttons');
                if (buttonsContainer && !buttonsContainer.contains(noBtn)) {
                    buttonsContainer.appendChild(noBtn);
                }
            }
        }, 1500);
    }
    
    // === СТРАНИЦА 1: Приглашение ===
    const page1YesBtn = document.getElementById('page1YesBtn');
    const page1NoBtn = document.getElementById('page1NoBtn');
    
    page1YesBtn.addEventListener('click', () => {
        createHeartFirework();
        showPage(2); // переходим к вопросу "Платишь ты?"
    });
    
    page1NoBtn.addEventListener('click', () => {
        noClickCountPage1++;
        if (noClickCountPage1 === 1) {
            alert("🥺 Подумай ещё... Нажми ещё разок ❤️");
            moveNoButton(page1NoBtn, 1);
        } else if (noClickCountPage1 === 2) {
            alert("💖 Ну пожалуйста! Я знаю, ты передумаешь 💖");
            moveNoButton(page1NoBtn, 1);
        } else if (noClickCountPage1 === 3) {
            alert("😭 Не убегай... Может всё-таки ДА? 😭");
            moveNoButton(page1NoBtn, 1);
        } else if (noClickCountPage1 >= 4) {
            alert("🎀 Хватит убегать! Давай уже ДА 😘🎀");
            moveNoButton(page1NoBtn, 1);
        }
        if (noClickCountPage1 >= 5) {
            page1NoBtn.style.display = 'none';
            alert("✨ Кнопка 'Нет' испарилась! Осталось только ДА ✨");
        }
    });
    
    // === СТРАНИЦА 2: Платишь ты? ===
    const page2YesBtn = document.getElementById('page2YesBtn');
    const page2NoBtn = document.getElementById('page2NoBtn');
    noButtonPage2 = page2NoBtn;
    
    function resetNoButtonOnPage2() {
        // Сбрасываем состояние кнопки "Нет" на странице 2
        noClickCountPage2 = 0;
        page2NoBtn.style.display = 'inline-block';
        page2NoBtn.style.position = 'relative';
        page2NoBtn.style.left = 'auto';
        page2NoBtn.style.top = 'auto';
        page2NoBtn.disabled = false;
        page2NoBtn.style.opacity = '1';
        const buttonsContainer = document.querySelector('#page2 .buttons');
        if (!buttonsContainer.contains(page2NoBtn)) {
            buttonsContainer.appendChild(page2NoBtn);
        }
    }
    
    page2YesBtn.addEventListener('click', () => {
        createHeartFirework();
        showPage(3); // финальная страница
        // меняем фон на более яркий
        document.body.style.background = "linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%)";
    });
    
    page2NoBtn.addEventListener('click', () => {
        noClickCountPage2++;
        if (noClickCountPage2 === 1) {
            alert("😅 Ну ладно... Но может передумаешь? 😅");
            moveNoButton(page2NoBtn, 2);
        } else if (noClickCountPage2 === 2) {
            alert("💸 Давай, соглашайся! Я же потрачусь на цветы! 💸");
            moveNoButton(page2NoBtn, 2);
        } else if (noClickCountPage2 === 3) {
            alert("🎈 Ну пожалуйста! Вжух — и ты платишь! 🎈");
            moveNoButton(page2NoBtn, 2);
        } else if (noClickCountPage2 >= 4) {
            alert("💖 Ладно, хватит! Давай уже ДА! 💖");
            moveNoButton(page2NoBtn, 2);
        }
        if (noClickCountPage2 >= 5) {
            page2NoBtn.style.display = 'none';
            alert("✨ Кнопка НЕТ исчезла! Придётся соглашаться))) ✨");
        }
    });
    
    // === СТРАНИЦА 3: Рестарт ===
    const restartBtn = document.getElementById('restartBtn');
    restartBtn.addEventListener('click', () => {
        // Полный сброс
        showPage(1);
        // Сбрасываем счётчики и видимость кнопок
        noClickCountPage1 = 0;
        noClickCountPage2 = 0;
        page1NoBtn.style.display = 'inline-block';
        page1NoBtn.style.position = 'relative';
        page1NoBtn.style.left = 'auto';
        page1NoBtn.style.top = 'auto';
        page1NoBtn.disabled = false;
        page1NoBtn.style.opacity = '1';
        
        page2NoBtn.style.display = 'inline-block';
        page2NoBtn.style.position = 'relative';
        page2NoBtn.style.left = 'auto';
        page2NoBtn.style.top = 'auto';
        page2NoBtn.disabled = false;
        page2NoBtn.style.opacity = '1';
        
        // Возвращаем фон
        document.body.style.background = "linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%)";
        
        createHeartFirework();
    });
    
    // === Сердечки внизу (кликабельные на всех страницах) ===
    document.querySelectorAll('.heart-icon').forEach(icon => {
        icon.addEventListener('click', () => {
            createHeartFirework();
            alert('💝 Люблю тебя, роднулечка!💝');
        });
    });
</script>
</body>
</html>
