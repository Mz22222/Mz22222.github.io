<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Приглашение💖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Pacifico', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Падающие сердечки */
        .heart {
            position: fixed;
            top: -20px;
            font-size: 1.5rem;
            opacity: 0.7;
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Главная карточка */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 60px 60px 80px 80px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), 0 0 0 10px rgba(255, 255, 255, 0.5);
            max-width: 550px;
            width: 100%;
            padding: 40px 30px 50px;
            text-align: center;
            transition: all 0.3s ease;
        }

        h1 {
            font-size: 2.6rem;
            color: #c53a5f;
            margin-bottom: 15px;
            word-break: keep-all;
            display: inline-block;
            border-bottom: 4px dotted #ffb7c5;
            padding-bottom: 8px;
        }

        .question {
            font-size: 2rem;
            margin: 25px 0 20px;
            color: #a1304f;
            font-weight: 600;
        }

        .gif-container {
            margin: 20px 0;
            border-radius: 50px;
            overflow: hidden;
            box-shadow: 0 12px 25px rgba(0,0,0,0.2);
        }

        .gif-container img {
            width: 100%;
            max-height: 260px;
            object-fit: cover;
            display: block;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin: 35px 0 25px;
            flex-wrap: wrap;
        }

        button {
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 32px;
            border: none;
            border-radius: 120px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 5px 0 rgba(0, 0, 0, 0.1);
        }

        .btn-yes {
            background-color: #ff8da1;
            color: white;
            box-shadow: 0 8px 0 #aa2e4e;
        }

        .btn-yes:hover {
            background-color: #ff6b85;
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #aa2e4e;
        }

        .btn-no {
            background-color: #bdc3c7;
            color: #2c3e50;
            box-shadow: 0 8px 0 #7f8c8d;
            position: relative;
        }

        .btn-no:hover {
            background-color: #a4a9ad;
            transform: translateY(-2px);
        }

        /* Секретное сообщение */
        .hidden-message {
            margin-top: 30px;
            background: #ffe4e9;
            padding: 18px;
            border-radius: 50px;
            display: none;
            animation: fadeInUp 0.6s ease;
            font-size: 1.3rem;
            color: #b83b5e;
            border: 2px solid #ffb7c2;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart-icon {
            font-size: 2rem;
            margin-top: 15px;
            color: #ff5e8b;
        }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #c97c8f;
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px 40px;
            }
            h1 {
                font-size: 2rem;
            }
            .question {
                font-size: 1.6rem;
            }
            button {
                font-size: 1.3rem;
                padding: 8px 22px;
            }
            .btn-yes, .btn-no {
                box-shadow: 0 5px 0 #aa2e4e;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>💌 Для тебя 💌</h1>
    <div class="gif-container">
        <!-- Милая гифка-котик/сердечко через бесплатный API (можно заменить на свою картинку) -->
        <img src="https://media1.tenor.com/m/Ol_v59QAUgEAAAAC/dance-cat.gif">
    </div>
    <div class="question">
        🌸 Пойдешь со мной на свидание? 🌸
    </div>
    <div class="buttons">
        <button class="btn-yes" id="yesBtn">Да 💖</button>
        <button class="btn-no" id="noBtn">Нет 🥺</button>
    </div>
    <div class="hidden-message" id="secretMessage">
        🎉 Ура! Я так счастлива! 🎉<br>
        🌹 Обнимаю и целую 🌹
    </div>
    <div class="heart-icon">❤️ 🧡 💛 💚 💙 💜</div>
    <footer>нажми на сердечко ✨</footer>
</div>

<script>
    // === РОМАНТИЧЕСКАЯ МАГИЯ ===

    // 1. Кнопка "ДА"
    const yesBtn = document.getElementById('yesBtn');
    const secretMsg = document.getElementById('secretMessage');
    const noBtn = document.getElementById('noBtn');

    yesBtn.addEventListener('click', () => {
        secretMsg.style.display = 'block';
        // Создаём фейерверк из сердечек
        for (let i = 0; i < 35; i++) {
            createHeartFirework();
        }
        // Меняем фон страницы на более яркий
        document.body.style.background = "linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%)";
        // Можно добавить приятный звук? (в браузере не авто, но оставим как есть)
        // Просто маленький сюрприз: меняем текст на кнопке
        yesBtn.textContent = '💞 Спасибо! 💞';
        yesBtn.disabled = true;
        noBtn.style.opacity = '0.5';
        noBtn.disabled = true;
    });

    // 2. Кнопка "НЕТ" с убеганием (милый троллинг)
    let noClickCount = 0;
    noBtn.addEventListener('click', () => {
        noClickCount++;
        if (noClickCount === 1) {
            alert("🥺 Подумай ещё... Нажми ещё разок ❤️");
            moveNoButton();
        } else if (noClickCount === 2) {
            alert("💖 Ну пожалуйста! Я знаю, ты передумаешь 💖");
            moveNoButton();
        } else if (noClickCount === 3) {
            alert("😭 Ладно, не убегай... Но ты можешь нажать ДА? 😭");
            moveNoButton();
        } else if (noClickCount >= 4) {
            alert("🎀 Хватит! Давай уже ДА 😘🎀");
            moveNoButton();
        }
        // После 5 кликов кнопка нет исчезает
        if (noClickCount >= 5) {
            noBtn.style.display = 'none';
            alert("✨ Кнопка 'Нет' испарилась от любви! Осталось только ДА ✨");
        }
    });

    function moveNoButton() {
        const maxX = window.innerWidth - noBtn.offsetWidth - 40;
        const maxY = window.innerHeight - noBtn.offsetHeight - 80;
        const randomX = Math.max(20, Math.min(maxX, Math.random() * maxX));
        const randomY = Math.max(20, Math.min(maxY, Math.random() * maxY));
        noBtn.style.position = 'fixed';
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;
        noBtn.style.zIndex = '999';
        // Через 1.2 секунды возвращаем обратно в контейнер? Нет, пусть останется плавающей, но если выйти за пределы?
        // Чтоб не терялась, через 2 секунды вернём в кнопки (только если не нажата ДА)
        setTimeout(() => {
            if (noBtn.disabled !== true && noBtn.style.display !== 'none') {
                noBtn.style.position = 'relative';
                noBtn.style.left = 'auto';
                noBtn.style.top = 'auto';
                document.querySelector('.buttons').appendChild(noBtn);
            }
        }, 1500);
    }

    // 3. Функция падающих сердечек (фон)
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌺'][Math.floor(Math.random() * 8)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.fontSize = Math.random() * 20 + 14 + 'px';
        heart.style.animationDuration = Math.random() * 3 + 2 + 's';
        heart.style.opacity = Math.random() * 0.6 + 0.3;
        document.body.appendChild(heart);
        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    // Падающие сердечки постоянно
    setInterval(createHeart, 500);

    // Фейерверк из сердечек при нажатии ДА
    function createHeartFirework() {
        for (let i = 0; i < 12; i++) {
            setTimeout(() => {
                const fireHeart = document.createElement('div');
                fireHeart.classList.add('heart');
                fireHeart.innerHTML = '💖';
                fireHeart.style.left = Math.random() * 100 + '%';
                fireHeart.style.top = Math.random() * 80 + '%';
                fireHeart.style.fontSize = Math.random() * 30 + 20 + 'px';
                fireHeart.style.animationDuration = '1.2s';
                fireHeart.style.opacity = '1';
                document.body.appendChild(fireHeart);
                setTimeout(() => fireHeart.remove(), 1200);
            }, i * 80);
        }
    }

    // Нажатие на сердечки внизу (доп. радость)
    document.querySelector('.heart-icon').addEventListener('click', () => {
        createHeartFirework();
        alert('💝 Ты нажал на сердечки! Люблю 💝');
    });
</script>
</body>
</html>
